##### Prefix & basics
set -g prefix C-a
unbind C-a
bind C-a send-prefix
set -g base-index 1
setw -g mode-keys vi
setw -g mouse on
set -g repeat-time 0
set -g focus-events on

##### Terminal/truecolor (Kitty + tmux)
# Use tmux-256color if available, else xterm-256color
set -g default-terminal "tmux-256color"
# Enable truecolor for common terms (incl. kitty)
set -ga terminal-overrides ",xterm-256color:Tc,xterm-kitty:Tc,tmux-256color:Tc,screen-256color:Tc"

##### Reload
bind R source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

##### Splits & navigation
bind v split-window -h
bind s split-window -v
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind C-o rotate-window

# Smart-ish pass-through to Vim splits (keeps your idea)
bind -n C-h run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|/)vim$') && tmux send-keys C-h || tmux select-pane -L"
bind -n C-j run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|/)vim$') && tmux send-keys C-j || tmux select-pane -D"
bind -n C-k run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|/)vim$') && tmux send-keys C-k || tmux select-pane -U"
bind -n C-l run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|/)vim$') && tmux send-keys C-l || tmux select-pane -R"
bind -n C-\\ run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|/)vim$') && tmux send-keys C-\\ || tmux select-pane -l"

##### Resize panes (Prefix + H/J/K/L) and Alt+Arrows
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -n M-Left  resize-pane -L 5
bind -n M-Right resize-pane -R 5
bind -n M-Up    resize-pane -U 2
bind -n M-Down  resize-pane -D 2

##### Layouts & pane size hints
bind + select-layout main-horizontal
bind = select-layout main-vertical
set -g display-panes-time 1500

##### Clipboard (Linux)
# Install one of: sudo apt install xclip   # (Xorg)
#                 sudo apt install wl-clipboard  # (Wayland)
if -b 'command -v wl-copy >/dev/null' \
  'set -g @copycmd "wl-copy"' \
  'set -g @copycmd "xclip -selection clipboard -i"'
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "#{@copycmd}"
unbind -T copy-mode-vi Enter
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "#{@copycmd}"

##### Status bar (Catppuccin-ish to match Kitty)
set -g status-interval 1
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#89b4fa"
set -g status-left  '#[fg=#a6e3a1]#H #[default]'
set -g status-right '#[fg=#89b4fa]%Y-%m-%d #[fg=#f9e2af]%H:%M:%S '
setw -g monitor-activity on
set -g visual-activity on
